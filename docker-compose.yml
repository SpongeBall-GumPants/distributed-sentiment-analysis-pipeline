version: "3.8"

services:
  hpdp-bigdata:
    image: suhothayan/hadoop-spark-pig-hive:2.9.2
    container_name: hpdp-bigdata
    hostname: hpdp-bigdata
    networks:
      - hpdp-net
    volumes:
      - ./:/opt/hpdp/project
    ports:
      - "50072:50070"
      - "8088:8088"
      - "8080:8080"
      - "10000:10000"
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          memory: 2000M

  hpdp-zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: hpdp-zookeeper
    hostname: hpdp-zookeeper
    networks:
      - hpdp-net
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    deploy:
      resources:
        limits:
          memory: 400M

  hpdp-kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: hpdp-kafka
    hostname: hpdp-kafka
    depends_on:
      - hpdp-zookeeper
    networks:
      - hpdp-net
    ports:
      - "29092:29092"
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "hpdp-zookeeper:2181"
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://hpdp-kafka:9092,EXTERNAL://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    deploy:
      resources:
        limits:
          memory: 600M

  hpdp-flink:
    build:
      context: ./infra/flink
      dockerfile: Dockerfile
    container_name: hpdp-flink
    hostname: hpdp-flink
    networks:
      - hpdp-net
    ports:
      - "8081:8081"
    volumes:
      - ./:/opt/hpdp/project
    deploy:
      resources:
        limits:
          memory: 2000M

networks:
  hpdp-net:
    driver: bridge